<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عدد محبين حسين حيدر العطار</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Lalezar&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <p class="badge">احب حسوني 😍</p>
      <h1>عدد محبين حسين حيدر العطار</h1>

      <section class="hearts" aria-label="قلوب متحركة">
        <span class="heart">❤</span>
        <span class="heart">❤</span>
        <span class="heart">❤</span>
        <span class="heart">❤</span>
        <span class="heart">❤</span>
        <span class="heart">❤</span>
      </section>

      <div class="counter-wrap">
        <p class="counter-label">العدد الحالي</p>
        <p id="counter" class="counter-number">0</p>
      </div>

      <button id="loveBtn" class="love-btn" type="button">+1 حب لحسين</button>
      <p id="status" class="status" aria-live="polite"></p>

      <footer>صنع بحب من ابن عمه ابو الزوس 💝</footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
